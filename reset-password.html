<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 300px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            color: #333;
            font-weight: bold;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 5px;
            display: none;
            font-size: 14px;
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .loading {
            display: none;
            color: #667eea;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>비밀번호 재설정</h1>
        <form id="resetForm">
            <div class="form-group">
                <label for="newPassword">새 비밀번호:</label>
                <input 
                    type="password" 
                    id="newPassword" 
                    required 
                    minlength="6"
                    placeholder="최소 6자 이상"
                >
            </div>
            <div class="form-group">
                <label for="confirmPassword">비밀번호 확인:</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    required 
                    minlength="6"
                    placeholder="비밀번호를 다시 입력하세요"
                >
            </div>
            <button type="submit" id="submitBtn">비밀번호 변경</button>
            <div class="loading" id="loading">처리 중...</div>
        </form>
        <div class="message" id="message"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase 설정
        const SUPABASE_URL = 'https://dubuvpwmleuynpizlznf.supabase.co'; // 여기에 Supabase URL을 입력하세요
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1YnV2cHdtbGV1eW5waXpsem5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDU2ODQsImV4cCI6MjA4ODYyMTY4NH0.pSg1TjlyTARfoWplPvzIp6sH639nEFcPmQTkXO6Tk-g'; // 여기에 Supabase Anon Key를 입력하세요

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('resetForm');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const message = document.getElementById('message');

        // 페이지 로드 시 URL 해시에서 세션 정보 추출 및 설정
        async function initializeSession() {
            try {
                // URL 해시에서 파라미터 추출
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const type = hashParams.get('type');
                const accessToken = hashParams.get('access_token');
                const refreshToken = hashParams.get('refresh_token');

                // type=recovery 확인
                if (type !== 'recovery') {
                    showMessage('유효하지 않은 비밀번호 재설정 링크입니다.', 'error');
                    submitBtn.disabled = true;
                    return;
                }

                // 토큰이 없으면 에러
                if (!accessToken) {
                    showMessage('세션 토큰이 없습니다. 이메일 링크를 다시 확인해주세요.', 'error');
                    submitBtn.disabled = true;
                    return;
                }

                // Supabase 세션 설정
                const { data, error } = await supabase.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken || ''
                });

                if (error) {
                    showMessage('세션 설정 실패: ' + error.message, 'error');
                    submitBtn.disabled = true;
                    return;
                }

                console.log('세션이 성공적으로 설정되었습니다.');
            } catch (error) {
                showMessage('오류가 발생했습니다: ' + error.message, 'error');
                submitBtn.disabled = true;
            }
        }

        // 페이지 로드 시 세션 초기화
        window.addEventListener('load', initializeSession);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // 비밀번호 일치 확인
            if (newPassword !== confirmPassword) {
                showMessage('비밀번호가 일치하지 않습니다.', 'error');
                return;
            }

            // 비밀번호 길이 확인
            if (newPassword.length < 6) {
                showMessage('비밀번호는 최소 6자 이상이어야 합니다.', 'error');
                return;
            }

            // 로딩 상태 표시
            submitBtn.disabled = true;
            loading.style.display = 'block';
            //message.style.display = 'none';

            try {
                // Supabase auth update 함수 호출
                const { data, error } = await supabase.auth.updateUser({
                    password: newPassword
                });

                if (error) {
                    showMessage('비밀번호 변경 실패: ' + error.message, 'error');
                } else {
                    showMessage('비밀번호가 성공적으로 변경되었습니다!', 'success');
                    form.reset();
                }
            } catch (error) {
                showMessage('오류가 발생했습니다: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
            message.style.display = 'block';
        }
    </script>
</body>
</html>
